css:
  bootstrap:
    path: "assets/css/bootstrap.min.css"
    weight: -100
    media: "all"
    # CDN optional - only used if self_host_assets = false
    cdn: "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
  
  fontawesome:
    path: "assets/css/fontawesome.min.css"
    weight: -90
    dependencies: ["bootstrap"]
  
  theme:
    path: "assets/css/theme.css"
    weight: 0
    dependencies: ["bootstrap", "fontawesome"]

js:
  bootstrap:
    path: "assets/js/bootstrap.bundle.min.js"
    weight: -100
    defer: true
    cdn: "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
  
  alpine:
    path: "assets/js/alpine.min.js"
    weight: -90
    defer: true
    cdn: "https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
  
  app:
    path: "assets/js/app.js"
    weight: 0
    dependencies: ["bootstrap", "alpine"]
    defer: true

fonts:
  inter:
    path: "assets/fonts/Inter.woff2"
    weight: 0
  
  jetbrains-mono:
    path: "assets/fonts/JetBrainsMono.woff2"
    weight: 10