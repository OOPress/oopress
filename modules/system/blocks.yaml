# System module blocks
system_menu:
  label: "Main Menu"
  description: "Displays the main navigation menu"
  class: "OOPress\\Block\\Block\\SystemMenuBlock"
  category: "Navigation"
  cacheable: true
  cache_tags: ["menu"]
  cache_contexts: ["user.roles", "url.path"]

user_info:
  label: "User Info"
  description: "Displays current user information"
  class: "OOPress\\Block\\Block\\UserInfoBlock"
  category: "User"
  cacheable: false
  cache_contexts: ["user"]
